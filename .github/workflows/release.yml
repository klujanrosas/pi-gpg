name: Release

on:
  push:
    tags:
      - "v*"

# Required so `npm publish --provenance` can attest that this build came from
# this specific workflow run. See:
# https://docs.npmjs.com/generating-provenance-statements
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Release gate (typecheck + lint + test + pack)
        run: npm run check && npm pack --dry-run

      - name: Assert tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing pi-gpg@$PKG_VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Installation:

            ```sh
            pi install npm:pi-gpg@${{ github.ref_name }}
            # or
            pi install git:github.com/${{ github.repository }}@${{ github.ref_name }}
            ```
